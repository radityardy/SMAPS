services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smaps-app
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database across restarts
      - smaps-db:/var/www/html/database
      # Persist storage (logs, cache, sessions)
      - smaps-storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  smaps-db:
  smaps-storage: